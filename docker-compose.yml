services:
  hf:
    build: .
    container_name: hf
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
    volumes:
      - ./scripts:/app/scripts:ro,z
      - ./aga_out:/app/aga_out:z
      - ${HF_MODELS_DIR:-/home/amitp/hf_models}:/models:z
    working_dir: /app
    command: ["python", "-u", "scripts/aga_script.py", "--outdir", "aga_out"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
